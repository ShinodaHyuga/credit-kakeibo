<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Credit Kakeibo</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <header>
      <div>
        <h1>支出管理アプリ</h1>
        <p class="subtitle">CSV取り込み・明細確認・カテゴリ判定ルール管理</p>
      </div>
      <div class="header-actions">
        <button id="reloadImport">CSV再読み込み</button>
        <span id="importResult" class="muted"></span>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="transactions">明細一覧</button>
      <button class="tab" data-tab="summary">支出</button>
      <button class="tab" data-tab="rules">カテゴリ管理</button>
    </nav>

    <main>
      <section id="transactions" class="panel active">
        <div class="section-head">
          <h3>明細一覧</h3>
          <span id="txCount" class="badge">0 件</span>
        </div>
        <div class="controls">
          <input id="txMonths" placeholder="months: 2026-01,2026-02" />
          <input id="txStore" placeholder="店舗名検索" />
          <label><input type="checkbox" id="txAll" /> 全件表示</label>
          <label><input type="checkbox" id="txUncategorized" /> 未分類のみ</label>
          <button id="txFilter">検索</button>
          <button id="txClear" class="ghost">クリア</button>
        </div>
        <table id="txTable">
          <thead>
            <tr>
              <th>利用日</th>
              <th>利用店名</th>
              <th>カテゴリ</th>
              <th>利用金額</th>
              <th>適用ルールID</th>
              <th>クイックルール作成</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>

      <section id="summary" class="panel">
        <div class="section-head">
          <h3>支出集計</h3>
          <span id="sumCount" class="badge">0 ヶ月</span>
        </div>
        <div class="controls">
          <input id="sumMonths" placeholder="months: 2026-01,2026-02" />
          <button id="sumFilter">集計</button>
          <button id="sumClear" class="ghost">クリア</button>
        </div>
        <table id="summaryTable">
          <thead></thead>
          <tbody></tbody>
        </table>
      </section>

      <section id="rules" class="panel">
        <div class="section-head">
          <h3>判定ルール</h3>
          <span id="ruleCount" class="badge">0 件</span>
        </div>
        <div class="controls">
          <input id="ruleFilterText" placeholder="matchText検索" />
          <label><input type="checkbox" id="ruleFilterActive" checked /> 有効のみ</label>
          <button id="ruleFilter">検索</button>
          <button id="ruleClear" class="ghost">クリア</button>
        </div>
        <table id="ruleTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>matchText</th>
              <th>カテゴリ</th>
              <th>有効</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>

        <h3>新規ルール追加</h3>
        <div class="controls">
          <input id="newMatchText" placeholder="matchText" />
          <select id="newCategory"></select>
          <label><input type="checkbox" id="newActive" checked /> 有効</label>
          <button id="createRule">追加</button>
        </div>

        <div class="section-head">
          <h3>未分類店舗</h3>
          <span id="uncCount" class="badge danger">0 件</span>
        </div>
        <div class="controls">
          <input id="uncStore" placeholder="店舗名検索" />
          <button id="uncFilter">検索</button>
          <button id="uncClear" class="ghost">クリア</button>
        </div>
        <table id="uncTable">
          <thead><tr><th>店舗名</th><th>クイック追加</th></tr></thead>
          <tbody></tbody>
        </table>
      </section>
    </main>

    <div id="notice" class="notice" hidden></div>

    <script src="/app.js"></script>
  </body>
</html>
